<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
  <title>Checkout | ASR Dress Makers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="glass-header">
  <img src="https://i.ibb.co/TqTTyWh9/1782989128253.png" alt="ASR Logo" class="logo-img">
  <div class="logo">ASR Checkout</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Shop</a>
    <a href="services.html">Services</a>
    <a href="cart.html">Cart</a>
  </nav>

  <div class="cart">🛒 <span id="cartCount">0</span></div>
</header>

<!-- CHECKOUT SECTION -->
<section class="checkout-container">

  <h1>Order Summary</h1>

  <div id="orderSummary"></div>

  <div class="checkout-box">

    <h2>Customer Details</h2>

    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Full Name" title="Full Name">

    <label for="phone">Phone Number</label>
    <input type="text" id="phone" placeholder="Phone Number" title="Phone Number">

    <label for="email">Email Address (Optional)</label>
    <input type="email" id="email" placeholder="Email Address (Optional)" title="Email Address">

    <label for="address">Full Address</label>
    <textarea id="address" placeholder="Full Address" title="Full Address"></textarea>

    <label for="appointmentDate">Preferred Appointment Date (Optional)</label>
    <input type="date" id="appointmentDate" title="Appointment Date">
<select id="paymentMethod" title="Payment Method">
  <option value="" disabled selected>Select Payment Method</option>

<option>Cash on Delivery</option>

<option>UPI</option>

<option>Cash at Store</option>

</select>

  <div class="checkout-buttons">

  <button onclick="generateInvoice()" class="btn-glow">
    📄 Download Invoice
  </button>

  <button onclick="placeOrder()" class="btn-glow">
    📲 Place Order
  </button>

</div>
  </div>

</section>

<script src="orders.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// CART COUNT
document.getElementById("cartCount").innerText = cart.length;

// SHOW ORDER SUMMARY
let summaryBox = document.getElementById("orderSummary");

if (cart.length === 0) {
  summaryBox.innerHTML = "<h3>Your cart is empty</h3>";
} else {
  let total = 0;

  summaryBox.innerHTML = cart.map(item => {
    total += item.price * item.qty;

    return `
      <div class="summary-card">
        <p><b>${item.name}</b></p>
        <p>Size: ${item.size || "Standard"}</p>
        <p>Qty: ${item.qty}</p>
        <p>₹${item.price * item.qty}</p>
      </div>
    `;
  }).join("");

  summaryBox.innerHTML += `
    <h2>Total: ₹${total}</h2>
  `;
}

// PLACE ORDER
function placeOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Please fill all details");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  let total = cart.reduce((a, b) => a + b.price * b.qty, 0);

  let orderId = "ASR" + Date.now();

  let itemsText = cart.map(i =>
    `${i.name} (x${i.qty}) - ₹${i.price * i.qty}`
  ).join("%0A");

  let message =
`🛍️ *ASR DRESS MAKERS ORDER*%0A
🆔 Order ID: ${orderId}%0A
👤 Name: ${name}%0A
📱 Phone: ${phone}%0A
🏠 Address: ${address}%0A%0A
🧵 Items:%0A${itemsText}%0A%0A
💰 Total: ₹${total}%0A
--------------------------------
Please confirm my order.`;

  let whatsappNumber = "919500176107"; // 👉 replace with your number

  let url = `https://wa.me/${whatsappNumber}?text=${message}`;

  // Save order locally also (for admin)
  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.push({
    id: orderId,
    customer: { name, phone, address },
    items: cart,
    total: total,
    status: "WhatsApp Pending"
  });

  localStorage.setItem("orders", JSON.stringify(orders));

  localStorage.removeItem("cart");

  window.open(url, "_blank");
}
</script>
<div id="cartDrawer" class="cart-drawer">

  <div class="cart-header">
    <h2>Your Cart</h2>
    <button onclick="toggleCart()">✖</button>
  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <h3 id="cartTotal">Total: ₹0</h3>
    <button onclick="goCheckout()" class="btn-glow">
      Checkout
    </button>
  </div>

</div>

<div id="overlay" onclick="toggleCart()"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="invoice.js"></script>
</body>
</html>
